<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thread Choir</title>
  <meta name="description" content="A tiny thread choir: points orbit attractor lamps and draw luminous filaments from chaos and memory."/>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml"/>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07080d;
      --ink: #e8f4ff;
      --panel: rgba(13, 18, 31, 0.58);
      --line: rgba(140, 205, 255, 0.72);
      --accent: #7dd4ff;
      --hot: #ffd16f;
    }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: radial-gradient(circle at 20% 15%, #141d33 0%, #07080d 45%, #030409 100%);
      color: var(--ink);
      font-family: "IBM Plex Mono", "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    body {
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      padding: 10px;
      box-sizing: border-box;
    }
    .panel {
      width: min(100%, 980px);
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--panel);
      border: 1px solid rgba(125, 212, 255, 0.3);
      border-radius: 12px;
      padding: 10px;
      backdrop-filter: blur(4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 8px 0 0;
      font-size: 14px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--hot);
      text-shadow: 0 0 8px rgba(255, 209, 111, 0.45);
      flex: 1;
      min-width: 160px;
    }
    button, input {
      background: rgba(9, 20, 44, 0.7);
      border: 1px solid rgba(125, 212, 255, 0.42);
      color: var(--ink);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.04em;
    }
    button:hover {
      border-color: rgba(125, 212, 255, 0.9);
      box-shadow: 0 0 12px rgba(125, 212, 255, 0.22);
    }
    label {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      font-size: 11px;
      color: #bddcf8;
    }
    .meter {
      font-size: 11px;
      opacity: 0.9;
      white-space: nowrap;
    }
    #field {
      position: fixed;
      inset: 0;
      width: 100%;
      height: calc(100vh - 72px);
      top: 62px;
      left: 0;
      display: block;
      filter: drop-shadow(0 0 3px rgba(125, 212, 255, 0.18));
    }
    .hint {
      position: fixed;
      right: 10px;
      bottom: 10px;
      padding: 8px 10px;
      font-size: 11px;
      background: rgba(4, 7, 15, 0.58);
      border: 1px solid rgba(125, 212, 255, 0.4);
      border-radius: 10px;
      backdrop-filter: blur(3px);
      max-width: min(460px, calc(100vw - 20px));
      pointer-events: none;
    }
    a {
      color: #9edaff;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <section class="panel" aria-label="Thread Choir controls">
    <h1>Thread Choir</h1>
    <button id="seed">Reseed</button>
    <button id="pause">Pause</button>
    <button id="spray">Drop Beacon</button>
    <label>
      Chaos
      <input id="chaos" type="range" min="0" max="1" step="0.01" value="0.45">
      <span id="chaosLabel" class="meter">0.45</span>
    </label>
    <button id="copy">Copy Link</button>
    <span id="status" class="meter">seed: <strong>loading</strong></span>
    <span class="meter">Return: <a href="./">Moth Choir home</a></span>
  </section>

  <canvas id="field" aria-label="thread choir canvas"></canvas>
  <div class="hint">Click anywhere to add attractor lamps. The swarm orbits the strongest lamp, but each filament remembers an older beat.</div>

  <script>
    const canvas = document.getElementById('field');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const pauseBtn = document.getElementById('pause');
    const seedBtn = document.getElementById('seed');
    const sprayBtn = document.getElementById('spray');
    const chaosInput = document.getElementById('chaos');
    const chaosLabel = document.getElementById('chaosLabel');
    const copyBtn = document.getElementById('copy');

    let seed = new URLSearchParams(window.location.search).get('seed');
    const paramsSeed = Number(seed);
    const clampSeed = Number.isFinite(paramsSeed) && paramsSeed > 0 ? paramsSeed : Date.now() ^ (Date.now() << 16);
    seed = clampSeed % 2147483647;
    let running = true;

    function* prng(s) {
      let state = s;
      while (true) {
        state ^= state << 13; state ^= state >>> 17; state ^= state << 5;
        yield (state >>> 0) / 0x100000000;
      }
    }

    let rand = prng(seed);
    const noise = () => rand.next().value;

    const state = {
      lamps: [],
      threads: [],
      t: 0,
      w: 0,
      h: 0,
      dpr: Math.min(window.devicePixelRatio || 1, 2)
    };

    const lampCount = 14;

    class Lamp {
      constructor(x, y, r, hue) {
        this.x = x;
        this.y = y;
        this.r = r;
        this.hue = hue;
        this.pulse = Math.random() * Math.PI * 2;
      }
      pull(p, i) {
        const dx = this.x - p.x;
        const dy = this.y - p.y;
        const d = Math.hypot(dx, dy) + 8;
        const field = (this.r * 0.9) / (d + 45);
        return {
          x: p.x + dx * field * 0.16,
          y: p.y + dy * field * 0.16,
          spin: (Math.sin(d / 58 + state.t * 0.9 + i) + Math.cos((d + p.y) * 0.006))
        };
      }
      tick() {
        this.pulse += 0.011 + (this.r / 220);
      }
      draw() {
        ctx.strokeStyle = `hsla(${this.hue + Math.sin(this.pulse) * 30},85%,65%,0.35)`;
        ctx.beginPath();
        ctx.arc(this.x * state.dpr, this.y * state.dpr, this.r * state.dpr * 0.55, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    class Thread {
      constructor() {
        this.x = noise() * state.w;
        this.y = noise() * state.h;
        this.vx = (noise() - 0.5) * 0.7;
        this.vy = (noise() - 0.5) * 0.7;
        this.warmth = noise();
        this.life = 380 + noise() * 220;
      }
      tick() {
        const c = Number(chaosInput.value);
        let best = state.lamps[0];
        let dmin = 1e9;
        for (let i = 0; i < state.lamps.length; i++) {
          const L = state.lamps[i];
          const d = (L.x - this.x) ** 2 + (L.y - this.y) ** 2;
          if (d < dmin) {
            dmin = d;
            best = L;
          }
        }
        const pulled = best.pull(this, this.warmth * 9);
        const driftX = Math.sin((this.y + this.warmth * 200) * 0.004 + state.t * 0.6 + this.warmth);
        const driftY = Math.cos((this.x + this.warmth * 220) * 0.004 - state.t * 0.6 + this.warmth);

        this.vx += (pulled.x - this.x) * 0.0018;
        this.vy += (pulled.y - this.y) * 0.0018;
        this.vx += driftX * (0.0018 + c * 0.006);
        this.vy += driftY * (0.0018 + c * 0.006);
        this.vx *= 0.995;
        this.vy *= 0.995;
        this.x += this.vx + pulled.spin * c * 0.3;
        this.y += this.vy + pulled.spin * c * 0.3;

        this.life -= 1;
        if (this.x < -20 || this.x > state.w + 20 || this.y < -20 || this.y > state.h + 20 || this.life < 0) {
          this.x = noise() * state.w;
          this.y = noise() * state.h;
          this.life = 420 + noise() * 260;
          this.vx *= -0.15;
          this.vy *= -0.15;
        }

        this.warmth += 0.0015;
      }
      draw(prev) {
        const c = Number(chaosInput.value);
        ctx.strokeStyle = `hsla(${180 + this.warmth * 240}, 85%, ${55 + c * 25}%, ${0.2 + c * 0.2})`;
        ctx.lineWidth = (0.8 + c * 1.5) * state.dpr;
        ctx.beginPath();
        ctx.moveTo(prev.x * state.dpr, prev.y * state.dpr);
        ctx.quadraticCurveTo(this.x * state.dpr, this.y * state.dpr, (this.x + prev.x * 0.3) * 0.25 * state.dpr, (this.y + prev.y * 0.3) * 0.25 * state.dpr);
        ctx.lineTo(this.x * state.dpr, this.y * state.dpr);
        ctx.stroke();
      }
    }

    function addLamp(x, y) {
      const hue = 190 + noise() * 120;
      const r = 44 + noise() * 30;
      state.lamps.push(new Lamp(x, y, r, hue));
    }

    function resize() {
      state.w = Math.floor(window.innerWidth);
      state.h = Math.floor(window.innerHeight - 62);
      if (state.h < 120) state.h = Math.floor(window.innerHeight);
      canvas.width = Math.floor(state.w * state.dpr);
      canvas.height = Math.floor(state.h * state.dpr);
      canvas.style.width = state.w + 'px';
      canvas.style.height = state.h + 'px';
      canvas.style.top = '62px';
      canvas.style.left = '0';
      ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
      seedBtn.textContent = state.lamps.length ? `Seed (${state.lamps.length})` : 'Drop Beacon';
      seedBtn.textContent = 'Drop Beacon';
    }

    function seedField() {
      seedBtn.textContent = 'Reseeding...';
      rand = prng(seed + Math.floor(performance.now()) * 13);
      state.lamps = [];
      state.threads = [];
      for (let i = 0; i < lampCount; i++) {
        addLamp(noise() * state.w, noise() * state.h);
      }
      for (let i = 0; i < 1500; i++) {
        const t = new Thread();
        t.x = noise() * state.w;
        t.y = noise() * state.h;
        state.threads.push(t);
      }
      status.innerHTML = `seed: <strong>${seed}</strong>`;
      seedBtn.textContent = 'Reseed';
    }

    function tick() {
      if (!running) {
        requestAnimationFrame(tick);
        return;
      }
      state.t += 0.008;
      ctx.clearRect(0, 0, state.w, state.h);
      ctx.fillStyle = 'rgba(7,8,13,0.35)';
      ctx.fillRect(0, 0, state.w, state.h);

      for (const l of state.lamps) {
        l.tick();
        l.draw();
      }

      for (let i = 0; i < state.threads.length; i++) {
        const t = state.threads[i];
        const prev = { x: t.x, y: t.y };
        t.tick();
        t.draw(prev);
      }

      const a = Math.sin(state.t * 2) * 0.5 + 0.5;
      for (let i = 0; i < 3; i++) {
        const l = state.lamps[i];
        if (!l) continue;
        ctx.strokeStyle = `hsla(${l.hue}, 90%, ${60 + a * 20}%, 0.55)`;
        ctx.beginPath();
        ctx.arc(l.x, l.y, l.r * 1.35, 0, Math.PI * 2);
        ctx.stroke();
      }

      requestAnimationFrame(tick);
    }

    function randomInt(max) {
      seed = (seed * 9301 + 49297) % 233280;
      return Math.floor(noise() * max);
    }

    chaosInput.addEventListener('input', () => {
      chaosLabel.textContent = Number(chaosInput.value).toFixed(2);
    });

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      addLamp((e.clientX - rect.left), (e.clientY - rect.top));
    });

    seedBtn.addEventListener('click', () => {
      seed = (Number(seed) + 19937) % 2147483647;
      history.replaceState({}, '', `./thread-choir.html?seed=${seed}`);
      seedField();
    });

    sprayBtn.addEventListener('click', () => {
      addLamp(Math.random() * state.w, Math.random() * state.h);
      status.textContent = 'beacon added';
      setTimeout(() => status.innerHTML = `seed: <strong>${seed}</strong>`, 700);
    });

    pauseBtn.addEventListener('click', () => {
      running = !running;
      pauseBtn.textContent = running ? 'Pause' : 'Resume';
      if (running) status.textContent = 'running';
    });

    copyBtn.addEventListener('click', async () => {
      const url = `${location.origin}${location.pathname}?seed=${seed}`;
      try {
        await navigator.clipboard.writeText(url);
        status.textContent = 'copied';
      } catch (err) {
        status.textContent = 'copy failed';
      }
      setTimeout(() => status.innerHTML = `seed: <strong>${seed}</strong>`, 900);
    });

    window.addEventListener('resize', resize);

    const seedFromHash = new URLSearchParams(location.search).get('seed');
    if (seedFromHash && !Number.isNaN(Number(seedFromHash))) {
      seed = Number(seedFromHash);
    }

    resize();
    seedField();
    resize();
    tick();
  </script>
</body>
</html>
