<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fractal Chorus</title>
  <meta
    name="description"
    content="A weird membrane-field sketch: touch the dark and let pulses braid a drifting choir of particles in strange feedback."
  />
  <style>
    :root {
      --ink: #f5fbff;
      --bg: #050510;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }

    #c {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: crosshair;
      display: block;
    }

    .hud {
      position: fixed;
      inset: 0.8rem;
      z-index: 10;
      display: grid;
      gap: 0.35rem;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(245, 251, 255, 0.85);
      text-shadow: 0 0 14px rgba(160, 224, 255, 0.2);
      pointer-events: none;
      user-select: none;
      line-height: 1.3;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .panel {
      max-width: min(62ch, 90vw);
      background: rgba(4, 6, 14, 0.58);
      border: 1px solid rgba(194, 230, 255, 0.16);
      backdrop-filter: blur(3px);
      padding: 0.6rem 0.75rem;
      border-radius: 0.5rem;
    }

    a {
      color: #f1ffff;
    }

    kbd {
      padding: 0 0.25rem;
      border-radius: 0.2rem;
      border: 1px solid rgba(211, 246, 255, 0.38);
      font-size: 0.8em;
      font-family: "SFMono-Regular", Menlo, Consolas, monospace;
      user-select: none;
    }

    .return {
      position: fixed;
      right: 0.8rem;
      bottom: 0.8rem;
      z-index: 11;
      color: #f8fffe;
      text-decoration: none;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border: 1px solid rgba(214, 246, 255, 0.2);
      border-radius: 999px;
      padding: 0.4rem 0.65rem;
      background: rgba(8, 12, 20, 0.55);
      backdrop-filter: blur(4px);
      pointer-events: auto;
      transition: opacity 0.2s ease;
    }

    .return:hover {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="hud">
    <div class="panel">
      <strong>Fractal Chorus</strong> — pointer-tied plasma with seeded pulses and memory trails.
    </div>
    <div class="panel row">
      <span><kbd>click</kbd> inject pulse</span>
      <span><kbd>C</kbd> clear memory</span>
      <span><kbd>R</kbd> randomize souls</span>
      <span><kbd>Space</kbd> pause</span>
      <span><kbd>/</kbd> mute</span>
    </div>
  </div>

  <a class="return" href="./">Return to Moth Choir</a>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    let w = 0;
    let h = 0;
    let running = true;
    let muted = false;

    const pointer = { x: 0, y: 0, alive: false };
    const grains = [];
    const pulses = [];

    const SOULS = 800;
    const FIELD_SPREAD = 900;

    function resize() {
      w = innerWidth;
      h = innerHeight;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = `${w}px`;
      canvas.style.height = `${h}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function seed() {
      pointer.x = w / 2;
      pointer.y = h / 2;

      for (let i = 0; i < SOULS; i++) {
        grains.push({
          x: Math.random() * w,
          y: Math.random() * h,
          px: 0,
          py: 0,
          vx: (Math.random() - 0.5) * 0.85,
          vy: (Math.random() - 0.5) * 0.85,
          drift: Math.random() * Math.PI * Math.PI,
          phase: Math.random() * Math.PI * 2,
          memory: 0,
          age: Math.random() * 10000,
        });
      }
    }

    function wrap(v, max) {
      if (v < 0) return v + max;
      if (v > max) return v - max;
      return v;
    }

    function noise(x, y, seed = 1.33) {
      return Math.sin(x * 127.1 + y * 311.7 + seed * 18.1) * 43758.5453123 % 1;
    }

    function field(x, y, time, seed) {
      const a = Math.sin((x + y * 0.62) * 0.0018 + time * 0.0009 + seed) * 2;
      const b = Math.cos((y - x * 0.47) * 0.0014 + Math.sin(time * 0.0003) + seed * 0.7) * 2;
      const n = Math.sin((x * 0.001 + seed) * 3 + (y * 0.0007)) * Math.cos((y * 0.001 - seed) * 2 + time * 0.0004);
      return {
        x: (a + n * 0.8) * 0.42,
        y: (b - n * 0.8) * 0.42,
      };
    }

    function addPulse(x, y) {
      for (let i = 0; i < 14; i++) {
        pulses.push({
          x,
          y,
          radius: 0,
          ttl: 1,
          pulse: 1,
          seed: Math.random() * 100,
          age: 0,
        });
      }
    }

    function paint(gram) {
      ctx.beginPath();
      ctx.arc(gram.x, gram.y, 1.2, 0, Math.PI * 2);
      const tone = (gram.phase + gram.memory) * 57 + (gram.x + gram.y) * 0.02;
      const lum = 44 + Math.abs(Math.sin((gram.age + gram.phase) * 0.01)) * 36;
      const alp = 0.04 + (gram.memory * 0.16);
      ctx.strokeStyle = `hsla(${tone % 360}, 90%, ${lum}%, ${alp})`;
      ctx.moveTo(gram.px, gram.py);
      ctx.lineTo(gram.x, gram.y);
      ctx.stroke();
    }

    let last = performance.now();
    function loop(now) {
      if (!running) {
        last = now;
        requestAnimationFrame(loop);
        return;
      }

      const dt = Math.min(40, now - last) / 16.666;
      last = now;
      const t = now;

      ctx.fillStyle = 'rgba(5, 5, 16, 0.13)';
      ctx.fillRect(0, 0, w, h);

      if (!muted) {
        ctx.fillStyle = 'rgba(8, 16, 36, 0.15)';
        for (let y = 0; y < 4; y++) {
          const yy = (h * 0.18 * (y + 0.6) + Math.sin(t * 0.00022 + y) * 15);
          ctx.beginPath();
          ctx.moveTo(0, yy);
          for (let x = 0; x <= w; x += 32) {
            const v = (Math.sin((x + t * 0.04 + y * 120) * 0.0035) + 0.5 * Math.sin((x * 0.009 + t * 0.0005) * 2)) * 5;
            ctx.lineTo(x, yy + v);
          }
          ctx.stroke();
        }
      }

      ctx.lineWidth = 1;
      ctx.beginPath();
      for (const g of grains) {
        g.px = g.x;
        g.py = g.y;
        g.age += dt;

        const pullX = pointer.alive ? (pointer.x - g.x) * 0.00035 : 0;
        const pullY = pointer.alive ? (pointer.y - g.y) * 0.00035 : 0;
        const f = field(g.x, g.y, t, g.drift);

        let ax = f.x + pullX;
        let ay = f.y + pullY;

        for (let i = 0; i < pulses.length; i++) {
          const p = pulses[i];
          const dx = p.x - g.x;
          const dy = p.y - g.y;
          const dist = Math.hypot(dx, dy) + 0.01;
          const halo = Math.exp(-(dist * dist) / (FIELD_SPREAD + p.age * 2));
          if (halo > 0.0008) {
            ax += (dx / dist) * halo * 7;
            ay += (dy / dist) * halo * 7;
            g.memory = Math.max(g.memory, halo);
          }
        }

        const spin = Math.sin(g.phase + t * 0.0008 + g.memory * 4) * 0.06;
        const tx = g.vx - ay * spin;
        g.vx = (g.vx + ax * 0.4) * 0.985;
        g.vy = (g.vy + ay * 0.4) * 0.985;

        g.vx += (tx - g.vx) * 0.01;

        g.x = wrap(g.x + g.vx * dt, w);
        g.y = wrap(g.y + g.vy * dt, h);

        g.memory *= 0.88;
        g.phase += 0.01 * dt + g.memory * 0.06;

        paint(g);
      }
      ctx.stroke();

      for (let i = pulses.length - 1; i >= 0; i--) {
        const p = pulses[i];
        p.age += dt * 0.9;
        p.radius += (0.7 + p.pulse * 0.9) * dt;
        p.ttl -= 0.011 * dt;
        if (p.ttl <= 0) {
          pulses.splice(i, 1);
          continue;
        }

        const alpha = p.ttl * 0.2;
        if (alpha < 0.01) continue;
        ctx.beginPath();
        ctx.strokeStyle = `hsla(${210 + p.seed}, 85%, 72%, ${alpha})`;
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.stroke();
      }

      requestAnimationFrame(loop);
    }

    function randomize() {
      pulses.length = 0;
      grains.length = 0;
      seed();
    }

    function clear() {
      pulses.length = 0;
      for (const g of grains) g.memory = 0;
      ctx.clearRect(0, 0, w, h);
    }

    resize();
    seed();
    requestAnimationFrame(loop);

    addPulse(w * 0.5, h * 0.5);

    window.addEventListener('resize', resize);

    window.addEventListener('pointermove', (event) => {
      pointer.alive = true;
      pointer.x = event.clientX;
      pointer.y = event.clientY;
    });

    window.addEventListener('pointerleave', () => {
      pointer.alive = false;
    });

    window.addEventListener('pointerdown', (event) => {
      pointer.alive = true;
      pointer.x = event.clientX;
      pointer.y = event.clientY;
      addPulse(pointer.x, pointer.y);
    });

    window.addEventListener('keydown', (event) => {
      if (event.code === 'Space') {
        running = !running;
        event.preventDefault();
      }
      if (event.code === 'KeyR') {
        randomize();
      }
      if (event.code === 'KeyC') {
        clear();
      }
      if (event.code === 'Slash') {
        muted = !muted;
      }
    });
  </script>
</body>
</html>
