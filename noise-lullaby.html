<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noise Lullaby</title>
  <style>
    :root {
      --ink: #e7f9ff;
      --bg: #04030a;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: "Trebuchet MS", "Gill Sans", "Segoe UI", sans-serif;
    }
    body {
      touch-action: none;
    }
    #c {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
    }
    #hud {
      position: fixed;
      left: 0.8rem;
      top: 0.8rem;
      z-index: 10;
      font-size: 12px;
      letter-spacing: 0.06em;
      line-height: 1.35;
      text-transform: uppercase;
      color: rgba(231, 249, 255, 0.82);
      text-shadow: 0 0 14px rgba(200, 238, 255, 0.12);
      user-select: none;
      pointer-events: none;
    }
    #hud kbd {
      font-family: "Courier New", monospace;
      font-weight: 600;
      border: 1px solid rgba(214, 248, 255, 0.35);
      padding: 0 0.28rem;
      border-radius: 0.2rem;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hud">
    <div><strong>Noise Lullaby</strong> — ambient interaction scene</div>
    <div><kbd>click</kbd> pulse // <kbd>drag</kbd> guide current stream // <kbd>W/S</kbd> warp speed // <kbd>R</kbd> reseed</div>
    <div><kbd>ArrowUp/Down</kbd> breath // <kbd>M</kbd> shift hue // <kbd>D</kbd> scatter // <kbd>Space</kbd> hush</div>
  </div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let w = 0;
    let h = 0;
    let dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    const particles = [];
    const pulses = [];
    const COUNT = 700;
    const state = {
      seed: Math.random() * 666,
      speed: 0.9,
      attraction: 0.35,
      hueShift: 196,
      running: true,
      mode: 0,
      pulsePower: 0.25,
      jitter: 0.7
    };
    const pointer = {
      x: 0,
      y: 0,
      down: false
    };
    let t = 0;

    function resize() {
      w = innerWidth;
      h = innerHeight;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = `${w}px`;
      canvas.style.height = `${h}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      pointer.x = w * 0.5;
      pointer.y = h * 0.5;
    }

    function rand(a, b) {
      return Math.random() * (b - a) + a;
    }

    function seedParticles() {
      particles.length = 0;
      for (let i = 0; i < COUNT; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          px: 0,
          py: 0,
          vx: rand(-0.6, 0.6),
          vy: rand(-0.6, 0.6),
          phase: Math.random() * Math.PI * 2,
          drift: rand(0.45, 1.25),
          age: Math.random() * 1000
        });
      }
    }

    function hash(x, y, k = state.seed) {
      const s = Math.sin(x * 12.9898 + y * 78.233 + k * 5.0) * 43758.5453123;
      return s - Math.floor(s);
    }

    function fade(t) {
      return t * t * (3 - 2 * t);
    }

    function noise(x, y) {
      const x0 = Math.floor(x);
      const y0 = Math.floor(y);
      const xf = x - x0;
      const yf = y - y0;
      const u = fade(xf);
      const v = fade(yf);
      const aa = hash(x0, y0);
      const ba = hash(x0 + 1, y0);
      const ab = hash(x0, y0 + 1);
      const bb = hash(x0 + 1, y0 + 1);
      const x1 = aa + (ba - aa) * u;
      const x2 = ab + (bb - ab) * u;
      return x1 + (x2 - x1) * v;
    }

    function fbm(x, y, oct = 5) {
      let amp = 1;
      let f = 1;
      let sum = 0;
      let norm = 0;
      for (let i = 0; i < oct; i++) {
        sum += noise(x * f, y * f) * amp;
        norm += amp;
        amp *= 0.5;
        f *= 2;
      }
      return sum / norm;
    }

    function addPulse(x, y, strong = 1) {
      for (let i = 0; i < 7; i++) {
        pulses.push({
          x,
          y,
          r: 8 + i * 16,
          life: 1,
          maxLife: 1,
          strength: strong * (1 - i * 0.08)
        });
      }
    }

    function stepPulse() {
      for (let i = pulses.length - 1; i >= 0; i--) {
        const p = pulses[i];
        p.life -= 0.008;
        p.r += 2.4;
        if (p.life <= 0 || p.strength < 0.02) {
          pulses.splice(i, 1);
        }
      }
    }

    function wrap(v, max) {
      if (v < 0) return v + max;
      if (v >= max) return v - max;
      return v;
    }

    function scatter() {
      particles.forEach((p) => {
        p.x = Math.random() * w;
        p.y = Math.random() * h;
        p.vx = rand(-1.2, 1.2);
        p.vy = rand(-1.2, 1.2);
      });
    }

    function paint(dt) {
      if (!state.running) return;

      t += dt * 0.08 * state.speed;
      const time = t * 0.001;
      const breath = 0.03 + Math.sin(time * 0.9) * 0.02;
      ctx.fillStyle = `rgba(4, 3, 10, ${0.06 + breath})`;
      ctx.fillRect(0, 0, w, h);
      stepPulse();

      const mx = pointer.x;
      const my = pointer.y;
      const active = pointer.down ? 1 : 0.35;

      // ambient field layer
      for (const p of particles) {
        p.age += dt;
        p.px = p.x;
        p.py = p.y;

        const nx = p.x * 0.0014 + 0.0009 * state.seed;
        const ny = p.y * 0.0014 + 0.001 * time * 0.8;
        const layerA = fbm(nx, ny + time * 0.12, 4);
        const layerB = fbm(nx + 3.1, ny + 14.8, 3);
        const layerC = fbm(nx + 11.4, ny - 24.3, 2);
        const angle = (layerA + layerB * 0.6 + layerC * 0.35 + state.mode * 0.12 + time * 0.03) * Math.PI * 2;
        const swirl = (Math.sin((nx - ny) * 6 + time * 1.2 + p.phase) * 0.35 + Math.cos(layerC * 6) * 0.25) * (state.speed + 0.3);

        let ax = Math.cos(angle) * 0.11 * state.speed;
        let ay = Math.sin(angle) * 0.11 * state.speed;
        ax += Math.cos(swirl + p.phase) * 0.03 * state.jitter;
        ay += Math.sin(swirl + p.phase) * 0.03 * state.jitter;

        const dx = mx - p.x;
        const dy = my - p.y;
        const dist2 = dx * dx + dy * dy + 0.01;
        const pull = Math.exp(-dist2 / (14000 + 2000 * state.attraction * state.attraction)) * state.attraction * 2.8 * active;
        ax += (dx * pull) / Math.sqrt(dist2);
        ay += (dy * pull) / Math.sqrt(dist2);

        for (let i = pulses.length - 1; i >= 0; i--) {
          const q = pulses[i];
          const tx = q.x - p.x;
          const ty = q.y - p.y;
          const d = Math.sqrt(tx * tx + ty * ty) + 0.1;
          const shell = 1 - Math.min(1, Math.abs(d - q.r) / 90);
          if (shell > 0.02) {
            const ring = (1 - q.life) * q.strength * shell * q.r * 0.0025 * active;
            ax += (tx / d) * ring;
            ay += (ty / d) * ring;
          }
        }

        p.vx = p.vx * 0.95 + ax;
        p.vy = p.vy * 0.95 + ay;
        p.x += p.vx * (1 + p.drift * 0.6) * (dt * 0.95);
        p.y += p.vy * (1 + p.drift * 0.6) * (dt * 0.95);

        p.x = wrap(p.x, w);
        p.y = wrap(p.y, h);

        const lifeTone = 0.33 + Math.min(1, p.age * 0.00015);
        const hue = (state.hueShift + (layerA - 0.5) * 220 + qHue(p.x, p.y, time) * 40) % 360;
        const sat = 72 + layerB * 28;
        const lum = 48 + layerC * 24 + breath * 100;
        ctx.beginPath();
        ctx.moveTo(p.px, p.py);
        ctx.lineTo(p.x, p.y);
        ctx.strokeStyle = `hsla(${hue}, ${sat}%, ${lum}%, ${0.1 * lifeTone})`;
        ctx.lineWidth = 0.6 + p.drift * 1.1;
        ctx.stroke();
      }

      for (let i = 0; i < pulses.length; i++) {
        const q = pulses[i];
        const alpha = q.life * 0.17 * state.pulsePower;
        ctx.beginPath();
        ctx.arc(q.x, q.y, Math.max(6, q.r * 0.55), 0, Math.PI * 2);
        const hue = (state.hueShift + 35 + i * 7) % 360;
        ctx.strokeStyle = `hsla(${hue}, 85%, 65%, ${alpha})`;
        ctx.lineWidth = 1.2 + 2 * alpha;
        ctx.stroke();
      }

      // sleepy horizon shimmer line
      for (let i = 0; i < 4; i++) {
        const y = h * (0.18 + i * 0.22) + Math.sin(time * 0.8 + i) * 22;
        const wave = Math.sin(time * 0.5 + i) * 0.12;
        ctx.beginPath();
        ctx.moveTo(0, y);
        for (let x = 0; x <= w; x += 42) {
          const wobble = fbm(x * 0.0025 + time * 0.17, i * 3 + time * 0.09, 3) * 24;
          ctx.lineTo(x, y + Math.sin((x * 0.004 + t * 0.009 + i) * (1.1 + wave)) * 9 + wobble);
        }
        ctx.strokeStyle = `rgba(240, 253, 255, ${0.03 + i * 0.012 + 0.025 * Math.sin(time + i)})`;
        ctx.lineWidth = 1.2;
        ctx.stroke();
      }

    }

    function qHue(x, y, time) {
      return fbm(x * 0.0008 + time * 0.11, y * 0.0008 - time * 0.03, 3);
    }

    let lastTick = performance.now();
    function loop(now) {
      const dt = Math.min(33, now - lastTick) / 16.666;
      lastTick = now;
      paint(dt);
      requestAnimationFrame(loop);
    }

    function init() {
      resize();
      seedParticles();
      addPulse(w * 0.5, h * 0.5, 0.2);
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', (e) => {
      pointer.x = e.clientX;
      pointer.y = e.clientY;
    });
    window.addEventListener('mouseenter', (e) => {
      pointer.x = e.clientX;
      pointer.y = e.clientY;
    });
    window.addEventListener('mousedown', (e) => {
      pointer.down = true;
      pointer.x = e.clientX;
      pointer.y = e.clientY;
      state.pulsePower = Math.min(1.5, state.pulsePower + 0.12);
      addPulse(pointer.x, pointer.y, 1.05);
    });
    window.addEventListener('mouseup', () => {
      pointer.down = false;
    });
    window.addEventListener('mouseleave', () => {
      pointer.down = false;
    });
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        state.running = !state.running;
        e.preventDefault();
      }
      if (e.code === 'KeyR') {
        state.seed = Math.random() * 1999;
        state.hueShift = Math.random() * 360;
        scatter();
      }
      if (e.code === 'KeyD') scatter();
      if (e.code === 'KeyM') {
        state.mode = (state.mode + 1) % 3;
        state.hueShift = (state.hueShift + 78) % 360;
      }
      if (e.code === 'KeyC') {
        ctx.clearRect(0, 0, w, h);
      }
      if (e.code === 'KeyW') {
        state.speed = Math.min(2.2, state.speed + 0.18);
      }
      if (e.code === 'KeyS') {
        state.speed = Math.max(0.25, state.speed - 0.16);
      }
      if (e.code === 'ArrowUp') {
        state.attraction = Math.min(1.5, state.attraction + 0.08);
      }
      if (e.code === 'ArrowDown') {
        state.attraction = Math.max(0.02, state.attraction - 0.08);
      }
      if (e.code === 'KeyP') {
        addPulse(Math.random() * w, Math.random() * h, 1.25);
      }
      if (e.code === 'KeyJ') {
        state.jitter = Math.min(1.7, state.jitter + 0.1);
      }
      if (e.code === 'KeyK') {
        state.jitter = Math.max(0.12, state.jitter - 0.1);
      }
    });

    window.addEventListener('wheel', (e) => {
      state.hueShift = (state.hueShift + e.deltaY * 0.08) % 360;
      if (state.hueShift < 0) state.hueShift += 360;
      e.preventDefault();
    }, { passive: false });

    // start
    init();
  </script>
</body>
</html>
